<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Page</title>
    <link rel="stylesheet" href="style.css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <h1>Welcome</h1>

    <a href="./easteregg.html">
      <div id="blackhole-wrapper">
        <div id="blackhole">
          <div id="text">
            <h1>Onderzoeksvragen</h1>
          </div>
        </div>
      </div>
</a>

    <script>
      const textElement = document.getElementById('text');
const innerText = textElement.innerText; 

textElement.innerHTML = innerText.split('').map(
  (char, i) => `<span style="transform: rotate(${i * 8.3}deg); display: inline-block;">${char}</span>`
).join('');
    </script>
  </body>
</html>
