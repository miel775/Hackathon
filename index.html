<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Page</title>
    <link rel="stylesheet" href="style.css" />

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>

    <a id="link" href="./easteregg.html">
      <div id="blackhole-wrapper">
        <div id="blackhole">
          <div id="text">
            <h1>Onderzoeksvragen</h1>
          </div>
        </div>
      </div>
</a>

    <script>
      const textElement = document.getElementById('text');
const innerText = textElement.innerText; 

textElement.innerHTML = innerText.split('').map(
  (char, i) => `<span style="transform: rotate(${i * 8.3}deg); display: inline-block;">${char}</span>`
).join('');


function spaNavigate(data) {

  if (!document.startViewTransition) {
    updateTheDOMSomehow(data);
    return;
  }


  document.startViewTransition(() => updateTheDOMSomehow(data));
}
    </script>
  </body>
</html>

<style>
  body {
  display: grid;
  place-items: center;
  height: 100vh;
  justify-content: center;
  align-items: center;
  font-family: "Space Mono"
}  

#blackhole {
  position: relative;
  background-color: transparent;
  height: 250px;
  width: 250px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  box-shadow: 0px 0px 46px 18px rgba(235,91,52,0.9);
}


#text {
  width: 100%;
  height: 100%;
  position: absolute;
  animation: rotation 10s linear infinite;
  z-index: 2;
  color: white;
  will-change: transform;
}
  
#text span {
  top: 0;
  position: absolute;
  left: 50%;
  margin-left: -0.5ch;
  font-size: 1.2em;
  transform-origin: 50% 125px;
  backface-visibility: hidden;
}
  
 #blackhole-wrapper {
    position: relative;
    display: block;
    height: 250px;
    width: 250px;
    background-color: black;
    border-radius: 50%;
    z-index: 1;
  }

 @keyframes rotation {
   from {
      transform: rotate(0deg);
    }
   
    to {
      transform: rotate(360deg);
    }
  }

#link::view-transition-old(root),
#link::view-transition-new(root) {
  animation-duration: 5s;
}
</style>
